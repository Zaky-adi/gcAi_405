# ==========================================
# 1. DEFINISI TIPE DATA (MODELS)
# ==========================================

type SystemStatus {
    id: ID!
    nama: String!
    deskripsi: String!
    status_text: String!
    is_active: Boolean! # Ini berguna untuk frontend menentukan warna (Hijau/Merah)
}

type PuncakTertinggi {
    jam: String!
    jumlah: Int!
}

type RingkasanLaporan {
    total: Int!
    rataRataPerHari: Float!
    puncakTertinggi: PuncakTertinggi
}

type ReportLaporan {
    ringkasan: RingkasanLaporan!
    data: [VehicleLog!]!
}

type StatistikMingguan {
    total: Int!
    persentase: Float!
}

type AuthResponse {
    token: String!
    uid: String!
    message: String!
}

type User {
    id: ID!
    name: String!
    email: String!
    role: String!
}

type Device {
    id: ID!
    device_name: String!
    location: String!
    is_active: Boolean!
}

type VehicleLog {
    id: ID!
    device_id: String!
    vehicle_type: String!
    confidence_score: Float!
    detected_at: String
}

type ParkingLot {
    id: ID!
    device_id: String!
    area_name: String!
    total_capacity: Int!
    current_occupied: Int!
}

type ScheduleLog {
  id: ID!
  gateId: ID!
  action: String!
  details: String!
  createdAt: String!
}

type GateSchedule {
  id: ID!
  gateName: String!
  startTime: String!
  endTime: String!
  activeDays: [String!]!
}

# ==========================================
# 2. ENDPOINT UNTUK MEMBACA DATA (QUERIES)
# ==========================================

type Query {

    # Mengambil daftar semua kamera/device
    devices: [Device!]!
        @field(resolver: "App\\GraphQL\\Queries\\DeviceQuery@resolve")

    # Mengambil riwayat log kendaraan berdasarkan ID kamera
    logsByDevice(device_id: String!): [VehicleLog!]!
        @field(resolver: "App\\GraphQL\\Queries\\LogQuery@resolve")

    # Mengambil status kapasitas area parkir saat ini
    parkingLots: [ParkingLot!]!
        @field(resolver: "App\\GraphQL\\Queries\\ParkingQuery@resolve")

    # Endpoint untuk mengambil 5 aktivitas deteksi terakhir
    aktivitasTerbaru: [VehicleLog!]!
    
    # Endpoint untuk mendapatkan total kendaraan yang masuk hari ini
    totalKendaraanMasukHariIni: Int!

    # Endpoint untuk mendapatkan total kendaraan yang masuk minggu ini
    totalKendaraanMasukMingguIni: StatistikMingguan!

    # Endpoint total mobil hari ini
    totalMobilHariIni: Int!

    # Endpoint total truck/pickup hari ini
    totalTrukHariIni: Int!

    # Endpoint untuk halaman laporan utama
    laporanKendaraan(
        startDate: String!
        endDate: String!
        vehicleType: String # Boleh kosong/null jika user memilih "Semua"
    ): ReportLaporan!

    # Endpoint untuk halaman Health Check / Status Sistem
    statusSistem: [SystemStatus!]!

    getGateSchedule(id: ID!): GateSchedule
    getScheduleLogs(gateId: ID!, limit: Int = 10): [ScheduleLog!]!
}

# ==========================================
# 3. ENDPOINT UNTUK MENULIS DATA (MUTATIONS)
# ==========================================

type Mutation {

    # --- Autentikasi (Publik) ---

    login(
        email: String!
        password: String!
    ): AuthResponse!
        @field(resolver: "App\\GraphQL\\Mutations\\AuthMutation@login")

    logout(
        uid: String!
    ): String!
        @field(resolver: "App\\GraphQL\\Mutations\\AuthMutation@logout")

    # --- Operasional Sistem ---

    # Endpoint untuk kamera AI mengirim data kendaraan masuk
    createVehicleLog(
        device_id: String!
        vehicle_type: String!
        confidence_score: Float!
    ): VehicleLog!
        @field(resolver: "App\\GraphQL\\Mutations\\CreateLogMutation@resolve")

    # Endpoint untuk menambahkan user baru
    createUser(
        name: String!
        email: String!
        password: String!
        role: String!
    ): User!
        @field(resolver: "App\\GraphQL\\Mutations\\UserMutation@createUser")
    
    # Dipanggil ketika tombol "Simpan Jadwal" ditekan di frontend
    updateGateSchedule(
        id: ID!
        startTime: String!
        endTime: String!
        activeDays: [String!]!
    ): GateSchedule!
}